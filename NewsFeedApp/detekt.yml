build:
  maxIssues: 0

config:
  validation: true
  checkExhaustiveness: false

complexity:
  active: true
  ComplexMethod:
    active: false
  CyclomaticComplexMethod:
    active: true
    threshold: 15

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated: ['Composable']

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  NewLineAtEndOfFile:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120

